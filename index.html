<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Cincinnati 311 — Flooding Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/leaflet.css">
</head>

<body>

  <header>
    <h1>Cincinnati 311 Service Requests — Flooding, 2025</h1>
  </header>

  <main class="dashboard">

    <section class="panel panel--map">
      <div class="panel-title-row">
        <h2 class="panel-title">Map</h2>
        <div>
          <button class="map-button" id="brushToggle">Toggle Brush</button>
        <button class="map-button" id="heatToggle">Toggle Heatmap</button>
        </div>
      </div>
      <div id="my-map"></div>
      <div class="panel-title-row">
        <div>
          <label style="font-size: 16px" for="map">Choose Option:</label>

          <select class="axis-label" style="font-size: 16px" name="map" id="map">
            <option value="neighborhood">Neighborhood</option>
            <option value="priority">Priority</option>
            <option value="agency">Agency</option>
            <option value="daysToComplete">Days To Complete</option>
          </select>
        </div>

        <div>
          <button class="map-button button-active" id="stadia-map">Stadia</button>
          <button class="map-button" id="esri-map">ESRI</button>
        </div>
      </div>
    </section>

    <section class="panel panel--timeline" id="timeline-section">
      <div class="panel-title-row">
        <h2 class="panel-title">Flooding Requests Over Time</h2>
        <div class="timeline-controls">
          <button id="brush-toggle" type="button">Enable Date Filter</button>
          <button id="brush-clear" type="button" class="hidden">Clear Filter</button>
        </div>
      </div>
      <div id="timeline-container"></div>
    </section>

  </main>

  <div id="tooltip"></div>

  <script src="js/d3.v6.min.js"></script>
  <script src="js/leaflet.js"></script>
  <script src="js/leaflet-heat.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/leafletMap.js"></script>
  <script src="js/main.js"></script>

</body>

</html>
